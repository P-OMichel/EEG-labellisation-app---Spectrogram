model:
  name: resattn_aniso_unet_temporal
  kwargs:
    num_classes: 10
    base_ch: 32
data:
  x_spec_path: X_Y_dataset/X_spec.npy
  y_path: X_Y_dataset/Y.npy
  test_size: 0.2
  val_size: 0.2
train:
  batch_size: 16
  lr: 0.001
  epochs: 150
  early_stop_patience: 20
  loss:
    name: focal
    kwargs:
      gamma: 2.0
save:
  out_dir: DL/runs/resattn_aniso_unet_temporal_focal
