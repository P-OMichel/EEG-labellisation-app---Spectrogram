model:
  name: specseg_2dcnn_linear
  kwargs:
    num_classes: 10
    enc_ch: 128
data:
  x_spec_path: X_Y_dataset/X_spec.npy
  y_path: X_Y_dataset/Y.npy
  test_size: 0.2
  val_size: 0.2
train:
  batch_size: 16
  lr: 0.001
  epochs: 80
  early_stop_patience: 12
  loss:
    name: hierarchical
    kwargs:
      gamma: 2.0
      bg_class: 0
save:
  out_dir: DL/runs/specseg_2dcnn_linear_hier
