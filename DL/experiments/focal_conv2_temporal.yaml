model:
  name: conv2_temporal
  kwargs:
    num_classes: 10
    enc_ch: 128
data:
  x_spec_path: X_Y_dataset/X_spec_08_04_2026.npy
  y_path: X_Y_dataset/Y_08_04_2026.npy
  test_size: 0.2
  val_size: 0.2
train:
  batch_size: 16
  lr: 0.001
  epochs: 150
  early_stop_patience: 20
  loss:
    name: focal_dice
    kwargs:
      gamma: 2.0
save:
  out_dir: DL/runs/conv2_temporal_focaldice
