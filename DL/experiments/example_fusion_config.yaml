model:
  name: "intermediate_fusion_segmentation"
  kwargs:
    num_classes: 10
    target_len: 297
    feat1d_ch: 32
    feat2d_ch: 128
    fusion_ch: 128
    use_aux_heads: true

branches:
  model_1d:
    name: "unet1d_tcn"
    kwargs:
      num_classes: 10
      base_ch: 32
      target_len: 297
    checkpoint:
      use: true
      path: "DL/runs/1D_unet_bottleneck_tcn_focaldice1/best_model.pt"
      strict: true
      key: "model_state_dict"
    freeze: false
    lr: 0.0001

  model_2d:
    name: "resattn_aniso_unet_temporal_tcn"
    kwargs:
      num_classes: 10
      base_ch: 32
      tcn_hidden: 128
      tcn_layers: 3
      target_len: 297
    checkpoint:
      use: true
      path: "DL/runs/2D_resattn_tcn/best_model.pt"
      strict: true
      key: "model_state_dict"
    freeze: false
    lr: 0.0001