data:
  test_size: 0.2
  val_size: 0.2
  x_eeg_path: X_Y_dataset/X_eeg_13_04_2026.npy
  x_spec_path: X_Y_dataset/X_spec_13_04_2026.npy
  y_path: X_Y_dataset/Y_13_04_2026.npy
model:
  branches:
    model_1d:
      config: DL/experiments/1D_unet_bottleneck_tcn.yaml
      freeze: false
      lr: 0.0001
      pretrained: true
    model_2d:
      config: DL/experiments/resattn_unet_temporal_focal_dice1.yaml
      freeze: false
      lr: 0.0001
      pretrained: true
  kwargs:
    feat1d_ch: 32
    feat2d_ch: 32
    fusion_ch: 32
    num_classes: 10
    target_len: 297
    use_aux_heads: true
  name: fusion_gate
save:
  out_dir: DL/runs/fusion_1D_unet_2D_res_attn_32
train:
  aux_loss:
    use: true
    weight_1d: 0.3
    weight_2d: 0.3
  batch_size: 16
  early_stop_patience: 20
  epochs: 150
  loss:
    kwargs:
      gamma: 2.0
    name: focal_dice1
  lr: 0.001
